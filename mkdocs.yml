site_name: flow-it-api
site_description: Python API library client for the FlowIt VMC machine
site_author: Alberto Geniola
site_url: https://albertogeniola.github.io/flow-it-api/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            import_identifier: true

nav:
  - Home: index.md
  - API Reference:
      - Client: reference/client.md
      - Models: reference/models.md
      - Auth: reference/auth.md
      - WebSocket: reference/websocket.md
      - Constants: reference/const.md
      - Exceptions: reference/exceptions.md
  - Contributing: contributing.md
  - License: license.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
